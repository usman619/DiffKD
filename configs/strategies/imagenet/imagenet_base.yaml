dataset: imagenet
aa: 'rand-m9-mstd0.5-inc1'
batch_size: 128
color_jitter: 0.4
decay_by_epoch: false
decay_epochs: 30
decay_rate: 0.1
drop: 0.0
epochs: 100
log_interval: 50
lr: 0.1
min_lr: 1.0e-05
model_ema: true
model_ema_decay: 0.9998
momentum: 0.9
opt: sgd
opt_betas: null
opt_eps: 1.0e-08
remode: const
reprob: 0.0
sched: cosine
seed: 42
smoothing: 0.1
warmup_epochs: 5
warmup_lr: 0.0
weight_decay: 1.0e-4
workers: 4
# ImageNet specific
mixup: 0.8
cutmix: 1.0
cutmix_minmax: null
mixup_prob: 1.0
mixup_switch_prob: 0.5
mixup_mode: 'batch'
val_batch_size_multiplier: 1.0
image_mean: [0.485, 0.456, 0.406]
image_std: [0.229, 0.224, 0.225]
